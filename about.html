<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakkımda & Portföy | Orçun - Analyst Roadmap</title>
    <meta name="description" content="Orçun'un kişisel analitik portföyü, veri bilimi, istatistik, ekonometri ve büyük veri projeleri, yetkinlikleri ve çalışma yaklaşımı.">
    <link rel="stylesheet" href="css/styles.css?v=3.4">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .skill-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            background: var(--bg-inner-box);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--neon-blue);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.15);
        }

        .timeline-item {
            position: relative;
            padding-left: 32px;
            margin-bottom: 32px;
            border-left: 2px solid var(--neon-blue);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 30px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.4);
            color: var(--text-main);
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="formulas-page">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('analyst_theme') || 'theme-light-purple';
            if (savedTheme !== 'theme-dark') {
                document.body.classList.add(savedTheme);
            }
        })();
    </script>

    <!-- ANA İÇERİK (BOŞ ŞABLON) -->
    <main class="formulas-main" style="max-width: 1200px; width: 100%; margin: 140px auto 100px auto; padding: 0 24px;">
        <section class="glass" style="padding: 60px 40px; border-radius: 28px; border: 1px dashed var(--glass-border); min-height: 450px; display: flex; align-items: center; justify-content: center; text-align: center;">
            <!-- Portföy içeriğinizi buraya ekleyebilirsiniz -->
        </section>
    </main>

    <script src="js/components.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
